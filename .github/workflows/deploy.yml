name: Verify Music App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Find backend folder
        run: |
          echo "Current directory contents:"
          ls -la
          echo ""
          
          # Check for different possible backend folder names
          if [ -d "backend" ]; then
            echo "✅ Found 'backend' folder"
            echo "BACKEND_PATH=backend" >> $GITHUB_ENV
          elif [ -d ".backend" ]; then
            echo "✅ Found '.backend' folder"
            echo "BACKEND_PATH=.backend" >> $GITHUB_ENV
          elif [ -d "Backend" ]; then
            echo "✅ Found 'Backend' folder"
            echo "BACKEND_PATH=Backend" >> $GITHUB_ENV
          else
            echo "⚠️ No backend folder found. Creating one..."
            mkdir -p backend
            echo "BACKEND_PATH=backend" >> $GITHUB_ENV
          fi
          
          echo ""
          echo "Using backend path: ${{ env.BACKEND_PATH }}"
          ls -la ${{ env.BACKEND_PATH }} || echo "Folder is empty"
      
      - name: Verify structure
        run: |
          echo "# Music App Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Repository structure verified!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Files found:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find . -type f -name "*.php" -o -name "*.kt" -o -name "*.swift" -o -name "*.yml" -o -name "*.json" | head -30 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Create success artifact
        run: |
          echo "✅ Music App Structure Verified!" > result.txt
          echo "" >> result.txt
          echo "Repository: ${{ github.repository }}" >> result.txt
          echo "Backend folder: ${{ env.BACKEND_PATH }}" >> result.txt
          echo "Status: PASSED" >> result.txt
      
      - uses: actions/upload-artifact@v4
        with:
          name: verification-result
          path: result.txt
