name: Build Music App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # BACKEND TESTS
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: music_app_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, pdo_pgsql, zip, redis
        tools: composer
    
    - name: Install Composer dependencies
      run: composer install --no-progress --prefer-dist
      working-directory: ./backend
    
    - name: Copy .env
      run: cp .env.example .env
      working-directory: ./backend
    
    - name: Generate app key
      run: php artisan key:generate
      working-directory: ./backend
    
    - name: Run migrations
      run: php artisan migrate --force
      working-directory: ./backend
      env:
        DB_CONNECTION: pgsql
        DB_HOST: localhost
        DB_PORT: 5432
        DB_DATABASE: music_app_test
        DB_USERNAME: test_user
        DB_PASSWORD: test_password
    
    - name: Run tests
      run: php artisan test
      working-directory: ./backend
      env:
        DB_CONNECTION: pgsql
        DB_HOST: localhost
        DB_PORT: 5432
        DB_DATABASE: music_app_test
        DB_USERNAME: test_user
        DB_PASSWORD: test_password

  # ANDROID BUILD
  build-android:
    runs-on: ubuntu-latest
    needs: test-backend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: ./android
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      working-directory: ./android
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: android-app-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Build Release APK
      run: ./gradlew assembleRelease
      working-directory: ./android
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: android-app-release
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30

  # IOS BUILD (MacOS runner)
  build-ios:
    runs-on: macos-latest
    needs: test-backend
    if: false  # Disabled by default - enable when you have a Mac runner
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode version
      run: sudo xcode-select -switch /Applications/Xcode_15.0.app
    
    - name: Build iOS app
      run: |
        cd ios
        xcodebuild -project MusicApp.xcodeproj \
          -scheme MusicApp \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          build
    
    - name: Upload iOS build
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: ios/build
        retention-days: 30

  # DEPLOY TO RAILWAY (Optional)
  deploy-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Railway
      uses: railway-deploy/railway-deploy@v2
      with:
        railway_token: ${{ secrets.RAILWAY_TOKEN }}
